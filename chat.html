<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чат участников</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      background: radial-gradient(circle at 50% 0%, #1e1e38 0%, #0d0e21 60%, #050512 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: #fff; padding: 20px;
    }
    .chat-container { width: 100%; max-width: 800px; height: 80vh; background: rgba(255, 255, 255, 0.02); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.08); display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 15px 20px; background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: space-between; align-items: center; }
    .status { font-size: 14px; display: flex; align-items: center; gap: 6px; }
    .status.online { color: #2ed573; }
    .status.offline { color: #ff4757; }
    .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 14px; font-size: 15px; line-height: 1.4; word-break: break-word; }
    .msg.system { background: rgba(255,255,255,0.05); color: #a5a9e8; align-self: center; font-size: 13px; border-radius: 8px; }
    .msg.other { background: rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
    .msg.my { background: rgba(126, 232, 250, 0.15); color: #7ee8fa; align-self: flex-end; border-bottom-right-radius: 4px; border: 1px solid rgba(126, 232, 250, 0.3); }
    .msg-user { font-weight: 700; font-size: 12px; margin-bottom: 3px; display: block; opacity: 0.8; }
    .chat-input-area { padding: 15px 20px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.08); display: flex; gap: 10px; }
    input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 16px; color: #fff; font-size: 15px; outline: none; }
    input:focus { border-color: #7ee8fa; }
    button { background: #7ee8fa; color: #0d0e21; border: none; padding: 0 24px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; }
    button:hover { background: #fff; box-shadow: 0 0 15px rgba(126,232,250,0.4); }
    .back-link { color: #a5a9e8; text-decoration: none; font-size: 14px; font-weight: 600; }
    .back-link:hover { color: #fff; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div>
      <h2 style="font-size: 18px;">💬 Общий чат кликеров</h2>
      <div id="status" class="status offline">● Подключение...</div>
    </div>
    <a href="index.html" class="back-link">← К тесту</a>
  </div>
  
  <div class="messages" id="messages"></div>

  <div class="chat-input-area">
    <input type="text" id="msgInput" placeholder="Напишите сообщение..." autocomplete="off">
    <button onclick="send()">ОТПРАВИТЬ</button>
  </div>
</div>

<script>
// Авто-определение хоста компьютера в Wi-Fi сети
const currentHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'localhost'
  : '192.168.31.142'; // <-- Твой актуальный IP-адрес установлен!

const WS_URL = `ws://${currentHost}:3000`;
const username = localStorage.getItem('typing_user') || 'Аноним';
let ws;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    const statusEl = document.getElementById('status');
    statusEl.className = 'status online';
    statusEl.textContent = '● Онлайн';
    
    ws.send(JSON.stringify({ type: 'system', name: username, text: `Пользователь ${username} вошел в чат` }));
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    const box = document.getElementById('messages');
    
    if (data.type === 'system') {
      let sysText = data.text || data.message || '';
      if (typeof sysText === 'object') sysText = sysText.text || sysText.message || JSON.stringify(sysText);
      box.innerHTML += `<div class="msg system">${sysText}</div>`;
    } else {
      let msgUser = data.username || data.name || 'Аноним';
      if (typeof msgUser === 'object') msgUser = msgUser.name || msgUser.username || 'Аноним';

      let msgText = data.text || data.message || '';
      if (typeof msgText === 'object') {
        msgText = msgText.text || msgText.message || msgText.data || JSON.stringify(msgText);
      }
      
      const isMy = msgUser === username;
      
      box.innerHTML += `
        <div class="msg ${isMy ? 'my' : 'other'}">
          <span class="msg-user" style="color:${isMy ? '#7ee8fa' : '#ffd700'}">${msgUser}</span>
          <div>${msgText}</div>
        </div>
      `;
    }
    box.scrollTop = box.scrollHeight;
  };

  ws.onclose = () => {
    const statusEl = document.getElementById('status');
    statusEl.className = 'status offline';
    statusEl.textContent = '● Отключен. Переподключение...';
    setTimeout(connect, 3000);
  };
}

function send() {
  const input = document.getElementById('msgInput');
  if(!input.value.trim() || ws.readyState !== WebSocket.OPEN) return;
  
  ws.send(JSON.stringify({
    type: 'message',
    username: username,
    name: username,
    text: input.value.trim(),
    message: input.value.trim()
  }));
  input.value = '';
}

document.getElementById('msgInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') send();
});

connect();
</script>
</body>
</html>
