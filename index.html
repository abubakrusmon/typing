<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Typing Speed Test — Abuabkr Элитный режим</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:100vw; height:100vh;
    background: radial-gradient(circle at 50% 0%, #1e1e38 0%, #0d0e21 60%, #050512 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }

  /* Сделали ширину приложения больше, чтобы строки были длиннее */
  #app { width: 95vw; max-width: 1100px; display: flex; flex-direction: column; gap: 35px; position: relative; }

  #profilePanel {
    position: absolute; top: -50px; right: 0; display: flex; align-items: center; gap: 12px;
    background: rgba(255, 255, 255, 0.03); padding: 6px 14px; border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.08); color: #fff; font-size: 14px;
  }
  #logoutBtn { background: none; border: none; color: #ff6b81; font-weight: 700; cursor: pointer; margin-left: 10px; }

  #registerScreen {
    position: absolute; inset: -60px -20px; background: #0d0e21; z-index: 300;
    display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff;
  }
  #usernameInput { padding: 16px 20px; font-size: 18px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff; text-align: center; margin-bottom: 20px; outline: none; }
  #saveUserBtn { padding: 14px 40px; font-size: 16px; font-weight: 700; color: #0b0c1f; background: linear-gradient(135deg, #7ee8fa, #eec0c6); border: none; border-radius: 14px; cursor: pointer; }

  #stats { display:flex; justify-content:space-between; align-items:center; color:#c9ccf5; padding: 0 40px; }
  .val { font-size:46px; font-weight:800; color:#7ee8fa; }
  .lbl { font-size:11px; letter-spacing:2px; color: #a5a9e8; text-transform:uppercase; }

  /* Текст теперь без бэкграунда и рамок — эффект «в воздухе» */
  #textViewport { 
    position:relative; font-size:32px; font-family: monospace; 
    height:130px; overflow:hidden; width: 100%; padding: 0px;
    background: none; border: none;
  }
  #textInner { 
    position:relative; display:flex; flex-wrap:wrap; line-height:60px; 
    pointer-events: none; transition: transform 0.2s ease; font-weight: 600; 
    color: rgba(255,255,255,0.2);
  }
  #textInner span { white-space:pre; display: inline-block; }
  .correct { color:#8bf7a0; text-shadow: 0 0 10px rgba(139,247,160,0.3); }
  .wrong { color:#ff6b81; background: rgba(255,107,129,0.2); border-radius:4px; }
  
  /* Идеально точная каретка прямо возле букв */
  #caret { 
    position:absolute; width:3px; height:36px; background:#7ee8fa; 
    box-shadow:0 0 8px #7ee8fa; transition: all 0.05s ease; 
    transform: translateY(12px); /* Точечное смещение к линии шрифта */
  }
  #hiddenInput { position:absolute; top:-9999px; left:-9999px; opacity:0; }
  #overlay { text-align:center; color:rgba(255,255,255,0.4); font-size:14px; margin-top: 5px; }

  #controlBar { display: flex; justify-content: center; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn { padding:10px 18px; border-radius:12px; font-size:13px; cursor:pointer; background: rgba(255,255,255,0.04); color:rgba(255,255,255,0.7); border:1px solid rgba(255,255,255,0.1); font-weight: 600; }
  .btn.active { background: rgba(126,232,250,0.15); border-color: #7ee8fa; color: #7ee8fa; }
  
  #chatOpenBtn { background: linear-gradient(135deg, #7ee8fa, #eec0c6); color: #0b0c1f; border: none; font-weight: 700; }

  #leaderboardPage { position: absolute; inset: -40px -10px; background: #0d0e21; z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
  .leaderList { width: 100%; max-width: 450px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; }
  .leaderRow { display: flex; justify-content: space-between; padding: 12px 16px; margin-bottom: 6px; background: rgba(255,255,255,0.03); border-radius: 10px; }
  .userRow { border: 1px solid #7ee8fa; background: rgba(126,232,250,0.1); color: #7ee8fa; }
</style>
</head>
<body>

<div id="app">
  <div id="profilePanel" style="display: none;">
    👤 <span id="profileUser" style="color: #7ee8fa; font-weight: bold;"></span>
    <button id="logoutBtn">Выйти</button>
  </div>

  <div id="registerScreen">
    <h2>Создай профиль</h2>
    <input type="text" id="usernameInput" placeholder="Никнейм..." maxlength="14" autocomplete="off">
    <button id="saveUserBtn">Зарегистрироваться</button>
  </div>

  <div id="leaderboardPage">
    <h2 style="margin-bottom: 20px; color: #ffca28; font-size: 28px;">🏆 Живой Рейтинг</h2>
    <div class="leaderList" id="leaderboardList"></div>
    <button class="btn" id="ratingCloseBtn" style="margin-top: 20px;">← Назад</button>
  </div>

  <div id="stats">
    <div class="metric"><div class="val" id="wpmVal">0</div><div class="lbl">WPM</div></div>
    <div class="metric"><div class="val" id="accVal">100%</div><div class="lbl">Точность</div></div>
    <div class="metric"><div class="val" id="errVal">0</div><div class="lbl">Ошибки</div></div>
    <div class="metric"><div class="val" id="timeVal">15</div><div class="lbl">Секунд</div></div>
  </div>

  <div id="textViewport">
    <div id="textInner"></div>
    <div id="caret"></div>
  </div>
  <input id="hiddenInput" autocomplete="off" autocapitalize="off" spellcheck="false">
  <div id="overlay">Кликни и начни писать · Текст парит в воздухе!</div>

  <div id="controlBar">
    <button class="btn time-btn active" data-t="15">15 сек</button>
    <button class="btn time-btn" data-t="30">30 сек</button>
    <button class="btn time-btn" data-t="60">60 сек</button>
    <button class="btn lang-btn active" data-l="ru">Русский</button>
    <button class="btn lang-btn" data-l="en">English</button>
    <button class="btn" id="ratingOpenBtn" style="color:#ffca28;">🏆 Рейтинг</button>
    <button class="btn" id="restartBtn">⟳ Сброс</button>
<button class="btn" id="chatOpenBtn" onclick="window.open('chat.html', '_blank')">💬 Чат в отдельной вкладке</button>  </div>
</div>

<script>
const DICTIONARIES = {
  ru: "время жизнь рука дело мир слово друг утро море небо солнце дождь снег ветер лед дом река гора поле книга стул стол окно дверь свет тень звук город дорога машина дерево птица трава человек душа песня голос огонь земля вода".split(' '),
  en: "process hand discovery artist thought practice noise experience change morning fox group way smell chair relation trust case quick stop book task machine speed shape world time life line sound light house water fire earth".split(' ')
};

let currentLang = 'ru';
let currentUsername = localStorage.getItem('typing_user') || '';

function checkAuth() {
  if(!currentUsername) {
    document.getElementById('registerScreen').style.display = 'flex';
  } else {
    document.getElementById('registerScreen').style.display = 'none';
    document.getElementById('profilePanel').style.display = 'flex';
    document.getElementById('profileUser').textContent = currentUsername;
  }
}

document.getElementById('saveUserBtn').addEventListener('click', () => {
  const name = document.getElementById('usernameInput').value.trim();
  if(name.length >= 2) {
    currentUsername = name;
    localStorage.setItem('typing_user', name);
    checkAuth();
    resetGame();
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  currentUsername = '';
  localStorage.removeItem('typing_user');
  location.reload();
});

let targetText = '', typed = '', timeLimit = 15, timeLeft = 15, timer = null, active = false;

function generateText() {
  let res = [];
  const dict = DICTIONARIES[currentLang];
  for(let i=0; i<350; i++) res.push(dict[Math.floor(Math.random()*dict.length)]);
  targetText = res.join(' ');
  typed = '';
  document.getElementById('hiddenInput').value = '';
  document.getElementById('textInner').style.transform = 'translateY(0px)';
  render();
}

function render() {
  let html = '';
  let errors = 0;
  for(let i=0; i<targetText.length; i++) {
    if(i < typed.length) {
      html += `<span class="${typed[i] === targetText[i] ? 'correct' : 'wrong'}">${targetText[i]}</span>`;
      if(typed[i] !== targetText[i]) errors++;
    } else {
      html += `<span>${targetText[i]}</span>`;
    }
  }
  document.getElementById('textInner').innerHTML = html;
  document.getElementById('errVal').textContent = errors;
  
  const span = document.getElementById('textInner').children[typed.length];
  if(span) {
    document.getElementById('caret').style.left = span.offsetLeft + 'px';
    document.getElementById('caret').style.top = span.offsetTop + 'px';
    
    if(span.offsetTop > 60) {
      document.getElementById('textInner').style.transform = `translateY(-${span.offsetTop - 0}px)`;
    } else {
      document.getElementById('textInner').style.transform = 'translateY(0px)';
    }
  }
}

document.getElementById('hiddenInput').addEventListener('input', (e) => {
  if(!currentUsername) return;
  typed = e.target.value;
  if(!active) {
    active = true;
    document.getElementById('overlay').style.display = 'none';
    timer = setInterval(() => {
      timeLeft--;
      document.getElementById('timeVal').textContent = timeLeft;
      if(timeLeft <= 0) {
        clearInterval(timer);
        saveScore();
      }
    }, 1000);
  }
  
  const correct = typed.split('').filter((c, i) => c === targetText[i]).length;
  const spentTime = (timeLimit - timeLeft) || 1;
  document.getElementById('wpmVal').textContent = Math.round((correct / 5) / (spentTime / 60));
  document.getElementById('accVal').textContent = typed.length ? Math.round((correct / typed.length) * 100) + '%' : '100%';
  
  render();
});

async function saveScore() {
  active = false;
  const correct = typed.split('').filter((c, i) => c === targetText[i]).length;
  const finalWpm = Math.round((correct / 5) / (timeLimit / 60));
  
  try {
    await fetch('http://localhost:3000/api/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUsername, wpm: finalWpm })
    });
  } catch(e) {}
  
  alert(`Тест окончен! Твой результат: ${finalWpm} WPM`);
  resetGame();
}

function resetGame() {
  clearInterval(timer);
  timeLeft = timeLimit;
  active = false;
  document.getElementById('timeVal').textContent = timeLeft;
  document.getElementById('wpmVal').textContent = '0';
  document.getElementById('accVal').textContent = '100%';
  document.getElementById('errVal').textContent = '0';
  document.getElementById('overlay').style.display = 'block';
  generateText();
}

document.querySelectorAll('.time-btn').forEach(b => {
  b.addEventListener('click', (e) => {
    document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
    e.target.classList.add('active');
    timeLimit = parseInt(e.target.dataset.t);
    resetGame();
  });
});

document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', (e) => {
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    e.target.classList.add('active');
    currentLang = e.target.dataset.l;
    resetGame();
  });
});

document.getElementById('ratingOpenBtn').addEventListener('click', async () => {
  document.getElementById('leaderboardPage').style.display = 'flex';
  const list = document.getElementById('leaderboardList');
  try {
    const res = await fetch('http://localhost:3000/api/leaders');
    const data = await res.json();
    list.innerHTML = '';
    data.leaders.forEach((p, idx) => {
      list.innerHTML += `<div class="leaderRow ${p.name === currentUsername ? 'userRow' : ''}">
        <span>#${idx+1} ${p.name}</span><strong>${p.wpm} WPM</strong>
      </div>`;
    });
  } catch (e) { list.innerHTML = '<div style="color:red;">Сервер недоступен</div>'; }
});

document.getElementById('ratingCloseBtn').addEventListener('click', () => {
  document.getElementById('leaderboardPage').style.display = 'none';
});

document.getElementById('restartBtn').addEventListener('click', resetGame);
document.body.addEventListener('click', (e) => {
  if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') {
    if(currentUsername) document.getElementById('hiddenInput').focus();
  }
});

checkAuth();
generateText();
</script>
</body>
</html>
