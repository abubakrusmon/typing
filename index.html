<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237ee8fa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3z'></path><path d='M6 21a3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3v12a3 3 0 0 0 3 3z'></path></svg>">
  <title>Typing Speed Test — Abuabkr</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 100vw; height: 100vh;
      background: radial-gradient(circle at 50% 0%, #1e1e38 0%, #0d0e21 60%, #050512 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: #fff; overflow: hidden;
    }

    #app { width: 95vw; max-width: 1100px; display: flex; flex-direction: column; gap: 35px; position: relative; }

    .user-panel {
      position: absolute; top: -50px; right: 0;
      display: flex; align-items: center; gap: 12px;
      background: rgba(255, 255, 255, 0.03); padding: 6px 14px; border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08); font-size: 14px;
    }
    .logout-btn { background: none; border: none; color: #ff6b81; font-weight: 700; cursor: pointer; margin-left: 10px; }

    .stats-container { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
    .stat-box .num { font-size: 46px; font-weight: 800; color: #7ee8fa; text-shadow: 0 0 10px rgba(126,232,250,0.3); }
    .stat-box .label { font-size: 11px; letter-spacing: 2px; color: #a5a9e8; text-transform: uppercase; margin-top: 4px; }

    #textViewport { 
      position: relative; font-size: 32px; font-family: monospace; 
      height: 130px; overflow: hidden; width: 100%; padding: 0;
    }
    #textInner { 
      position: relative; display: flex; flex-wrap: wrap; line-height: 60px; 
      pointer-events: none; transition: transform 0.2s ease; font-weight: 600; 
      color: rgba(255,255,255,0.2);
    }
    #textInner span { white-space: pre; display: inline-block; }
    .correct { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
    .wrong { color: #ff6b81; background: rgba(255,107,129,0.2); border-radius: 4px; }
    
    #caret { 
      position: absolute; width: 2px; height: 36px; background: #7ee8fa; 
      box-shadow: 0 0 8px #7ee8fa; transition: all 0.05s ease; 
      transform: translateY(12px); animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #hiddenInput { position: absolute; top: -9999px; left: -9999px; opacity: 0; }
    #overlay { text-align: center; color: rgba(255,255,255,0.4); font-size: 14px; margin-top: 5px; }

    .controls { display: flex; justify-content: center; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn { padding: 10px 18px; border-radius: 12px; font-size: 13px; cursor: pointer; background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.1); font-weight: 600; transition: 0.2s; }
    .btn.active { background: rgba(126,232,250,0.15); border-color: #7ee8fa; color: #7ee8fa; }
    
    /* КОНТЕЙНЕР ДЛЯ НИЖНИХ КНОПОК РЯДОМ */
    .bottom-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 10px;
    }

    /* СТИЛИ ДЛЯ УМЕНЬШЕННЫХ КНОПОК СНИЗУ */
    .btn-bottom {
      padding: 6px 16px !important;
      font-size: 13px !important;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    .btn-chat {
      background: rgba(126,232,250,0.05); color: #7ee8fa; border: 1px solid rgba(126,232,250,0.3);
    }
    .btn-chat:hover { background: linear-gradient(135deg, #7ee8fa, #eec0c6); color: #0b0c1f; border-color: transparent; }

    .btn-leader {
      background: rgba(255, 215, 0, 0.05); color: #ffd700; border: 1px solid rgba(255, 215, 0, 0.3);
    }
    .btn-leader:hover { background: linear-gradient(135deg, #ffd700, #ffb300); color: #0b0c1f; border-color: transparent; }

    /* Таблица рейтинга модалка */
    #leaderboardModal {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(5, 5, 18, 0.85); justify-content: center; align-items: center; z-index: 100;
    }
    .modal-content {
      background: #17212b; border: 1px solid rgba(255,255,255,0.1); padding: 30px;
      border-radius: 20px; width: 90%; max-width: 450px; text-align: center;
    }
    .modal-content h3 { color: #ffd700; margin-bottom: 20px; font-size: 20px; }
    .leader-list { text-align: left; margin-bottom: 20px; max-height: 250px; overflow-y: auto; }
    .leader-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  </style>
</head>
<body>

<div id="app">
  <div class="user-panel">
    👤 <span id="profileUser" style="color: #7ee8fa; font-weight: bold;"></span>
    <button class="logout-btn" onclick="logout()">Выйти</button>
  </div>

  <div class="stats-container">
    <div class="stat-box"><div class="num" id="wpmVal">0</div><div class="label">WPM</div></div>
    <div class="stat-box"><div class="num" id="accVal">100%</div><div class="label">Точность</div></div>
    <div class="stat-box"><div class="num" id="errVal">0</div><div class="label">Ошибки</div></div>
    <div class="stat-box"><div class="num" id="timeVal">15</div><div class="label">Секунд</div></div>
  </div>

  <div id="textViewport">
    <div id="textInner"></div>
    <div id="caret"></div>
  </div>
  <input id="hiddenInput" autocomplete="off" autocapitalize="off" spellcheck="false">
  <div id="overlay">Кликни и начни писать · Текст парит в воздухе!</div>

  <div class="controls">
    <button class="btn time-btn active" data-t="15" onclick="changeTime(15, this)">15 сек</button>
    <button class="btn time-btn" data-t="30" onclick="changeTime(30, this)">30 сек</button>
    <button class="btn time-btn" data-t="60" onclick="changeTime(60, this)">60 сек</button>
    <button class="btn lang-btn active" data-l="ru" onclick="changeLang('ru', this)">Русский</button>
    <button class="btn lang-btn" data-l="en" onclick="changeLang('en', this)">English</button>
    <button class="btn" id="restartBtn" onclick="resetGame()">🔄 Сброс</button>
  </div>

  <div class="bottom-row">
    <button class="btn-bottom btn-chat" id="chatOpenBtn" onclick="location.href='chat.html'">💬 Чат</button>
    <button class="btn-bottom btn-leader" onclick="openLeaderboard()">🏆 Рейтинг</button>
  </div>
</div>

<div id="leaderboardModal">
  <div class="modal-content">
    <h3>🏆 Таблица лидеров</h3>
    <div class="leader-list" id="leaderList">Загрузка...</div>
    <button class="btn" onclick="closeLeaderboard()" style="width: 100%;">Закрыть</button>
  </div>
</div>

<script>
const DICTIONARIES = {
  ru: "время жизнь рука дело мир слово друг утро море небо солнце дождь снег ветер лед дом река гора поле книга стул стол окно дверь свет тень звук город дорога машина дерево птица трава человек душа песня голос огонь земля вода".split(' '),
  en: "process hand discovery artist thought practice noise experience change morning fox group way smell chair relation trust case quick stop book task machine speed shape world time life line sound light house water fire earth".split(' ')
};

let currentLang = 'ru';
let currentUsername = localStorage.getItem('typing_user') || '';

if (!currentUsername) {
  currentUsername = prompt("Введите ваш никнейм:") || "Аноним";
  localStorage.setItem('typing_user', currentUsername);
}
document.getElementById('profileUser').textContent = currentUsername;

let targetText = '', typed = '', timeLimit = 15, timeLeft = 15, timer = null, active = false;

function generateText() {
  let res = [];
  const dict = DICTIONARIES[currentLang];
  for(let i=0; i<350; i++) res.push(dict[Math.floor(Math.random()*dict.length)]);
  targetText = res.join(' ');
  typed = '';
  document.getElementById('hiddenInput').value = '';
  document.getElementById('textInner').style.transform = 'translateY(0px)';
  render();
}

function render() {
  let html = '';
  let errors = 0;
  for(let i=0; i<targetText.length; i++) {
    if(i < typed.length) {
      html += `<span class="${typed[i] === targetText[i] ? 'correct' : 'wrong'}">${targetText[i]}</span>`;
      if(typed[i] !== targetText[i]) errors++;
    } else {
      html += `<span>${targetText[i]}</span>`;
    }
  }
  document.getElementById('textInner').innerHTML = html;
  document.getElementById('errVal').textContent = errors;
  
  const span = document.getElementById('textInner').children[typed.length];
  if(span) {
    document.getElementById('caret').style.left = span.offsetLeft + 'px';
    document.getElementById('caret').style.top = span.offsetTop + 'px';
    
    document.getElementById('caret').style.animation = 'none';
    void document.getElementById('caret').offsetWidth;
    document.getElementById('caret').style.animation = 'blink 1s infinite';

    if(span.offsetTop > 60) {
      document.getElementById('textInner').style.transform = `translateY(-${span.offsetTop - 10}px)`;
    } else {
      document.getElementById('textInner').style.transform = 'translateY(0px)';
    }
  }
}

document.getElementById('hiddenInput').addEventListener('input', (e) => {
  typed = e.target.value;
  if(!active) {
    active = true;
    document.getElementById('overlay').style.display = 'none';
    timer = setInterval(() => {
      timeLeft--;
      document.getElementById('timeVal').textContent = timeLeft;
      if(timeLeft <= 0) {
        clearInterval(timer);
        saveScore();
      }
    }, 1000);
  }
  
  const correct = typed.split('').filter((c, i) => c === targetText[i]).length;
  const spentTime = (timeLimit - timeLeft) || 1;
  document.getElementById('wpmVal').textContent = Math.round((correct / 5) / (spentTime / 60));
  document.getElementById('accVal').textContent = typed.length ? Math.round((correct / typed.length) * 100) + '%' : '100%';
  
  render();
});

async function saveScore() {
  active = false;
  const correct = typed.split('').filter((c, i) => c === targetText[i]).length;
  const finalWpm = Math.round((correct / 5) / (timeLimit / 60));
  
  try {
    await fetch('http://localhost:3000/api/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUsername, wpm: finalWpm })
    });
  } catch(e) {}
  
  alert(`Тест окончен! Результат: ${finalWpm} WPM`);
  resetGame();
}

function resetGame() {
  clearInterval(timer);
  timeLeft = timeLimit;
  active = false;
  document.getElementById('timeVal').textContent = timeLeft;
  document.getElementById('wpmVal').textContent = '0';
  document.getElementById('accVal').textContent = '100%';
  document.getElementById('errVal').textContent = '0';
  document.getElementById('overlay').style.display = 'block';
  generateText();
  document.getElementById('hiddenInput').focus();
}

function changeTime(sec, el) {
  document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
  timeLimit = sec;
  resetGame();
}

function changeLang(lang, el) {
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
  currentLang = lang;
  resetGame();
}

async function openLeaderboard() {
  document.getElementById('leaderboardModal').style.display = 'flex';
  const list = document.getElementById('leaderList');
  list.innerHTML = "Загрузка...";
  try {
    const res = await fetch('http://localhost:3000/api/leaders');
    const data = await res.json();
    if(data.leaders.length === 0) {
      list.innerHTML = "Рекордов пока нет. Будь первым!";
    } else {
      list.innerHTML = data.leaders.map((p, idx) => `
        <div class="leader-item">
          <span>${idx + 1}. ${p.name}</span>
          <span style="color: #7ee8fa; font-weight: bold;">${p.wpm} WPM</span>
        </div>
      `).join('');
    }
  } catch (e) {
    list.innerHTML = "Ошибка загрузки рейтинга.";
  }
}

function closeLeaderboard() {
  document.getElementById('leaderboardModal').style.display = 'none';
  document.getElementById('hiddenInput').focus();
}

function logout() {
  localStorage.removeItem('typing_user');
  location.reload();
}

document.body.addEventListener('click', (e) => {
  if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON' && !document.getElementById('leaderboardModal').contains(e.target)) {
    document.getElementById('hiddenInput').focus();
  }
});

generateText();
document.getElementById('hiddenInput').focus();
</script>
</body>
</html>
